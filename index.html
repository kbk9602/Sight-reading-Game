<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>악보 읽기 게임 - 메뉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
    body { text-align: center; font-family: "Nanum Gothic", sans-serif; background-color: #f8f9fa; padding-top: 40px; }
    h1 { font-family: "Black Han Sans", sans-serif; font-weight: normal; margin-bottom: 20px; font-size: 36px; }
    .menu-box { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    select, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-family: "Nanum Gothic", sans-serif; }
    button { background-color: #0046ff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 18px; }
    button:hover { background-color: #0037cc; }
    label { font-weight: bold; display: block; text-align: left; margin-top: 15px; color: #333; }
</style>
</head>
<body>

<div class="menu-box">
    <h1>🎹 키키 뮤직 - 음이름 게임</h1>
    
    <label>1. 음 개수</label>
    <select id="notesMode">
        <option value="1">1개</option>
        <option value="2">2개</option>
        <option value="3">3개</option>
    </select>

    <label>2. 음역대</label>
    <select id="stageMode">
        <option value="1">1. F1 ~ E2 (낮은음자리표)</option>
        <option value="2">2. C2 ~ E3 (낮은음자리표)</option>
        <option value="3">3. C3 ~ C4 (낮은음자리표)</option>
        <option value="4">4. A3 ~ G4 (낮은음자리표)</option>
        <option value="5">5. F3 ~ E4 (높은음자리표)</option>
        <option value="6">6. C4 ~ C5 (높은음자리표)</option>
        <option value="7">7. C5 ~ E6 (높은음자리표)</option>
        <option value="8">8. C6 ~ C7 (높은음자리표)</option>
    </select>

    <label>3. 건반 모드 설정</label>
    <select id="accidentalMode">
        <option value="none">흰 건반 기본</option>
        <option value="both">흰 건반 + 검은 건반 (♯, ♭ 임시표 포함)</option>
    </select>

    <button onclick="startGame()">게임 시작! 🚀</button>
</div>

<script>
function startGame() {
    const notes = document.getElementById("notesMode").value;
    const stage = document.getElementById("stageMode").value;
    const accidental = document.getElementById("accidentalMode").value;

    // 설정을 쿼리 스트링으로 묶어 game.html 하나로 전송합니다.
    location.href = `game.html?notes=${notes}&stage=${stage}&accidental=${accidental}`;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎹 통합 화음 트레이닝 센터</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .menu-wrapper { background: white; padding: 20px; border-radius: 15px; max-width: 900px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section-title { font-size: 14px; color: #666; margin: 15px 0 8px; font-weight: bold; }
        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        
        .btn { 
            padding: 10px 18px; border: 1px solid #ddd; border-radius: 8px; background: white; 
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        
        #game-frame { 
            width: 100%; height: 750px; border: none; margin-top: 20px; 
            background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
    </style>
</head>
<body>

    <h1>🎶 화음 마스터 트레이닝</h1>

    <div class="menu-wrapper">
        <div class="section-title">Step 1: 퀴즈 형식 선택</div>
        <div class="btn-group" id="size-btns">
            <button class="btn" onclick="setSize(1, this)">단음</button>
            <button class="btn" onclick="setSize(2, this)">2음 화음</button>
            <button class="btn" onclick="setSize(3, this)">3화음</button>
        </div>

        <div class="section-title">Step 2: 음역대 선택</div>
        <div class="btn-group" id="range-btns">
            <button class="btn" onclick="setRange(1, this)">F1-E2 (F)</button>
            <button class="btn" onclick="setRange(2, this)">C2-C3 (F)</button>
            <button class="btn" onclick="setRange(3, this)">C3-C4 (F)</button>
            <button class="btn" onclick="setRange(4, this)">A3-G4 (F)</button>
            <button class="btn" onclick="setRange(5, this)">F3-F4 (G)</button>
            <button class="btn" onclick="setRange(6, this)">C4-C5 (G)</button>
            <button class="btn" onclick="setRange(7, this)">C5-C6 (G)</button>
            <button class="btn" onclick="setRange(8, this)">C6-C7 (G)</button>
        </div>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        let selectedSize = null;
        let selectedRange = null;

        function setSize(size, el) {
            selectedSize = size;
            updateBtnState('size-btns', el);
            checkAndLoad();
        }

        function setRange(range, el) {
            selectedRange = range;
            updateBtnState('range-btns', el);
            checkAndLoad();
        }

        function updateBtnState(groupId, activeEl) {
            document.querySelectorAll(`#${groupId} .btn`).forEach(b => b.classList.remove('active'));
            activeEl.classList.add('active');
        }

        function checkAndLoad() {
            if (selectedSize && selectedRange) {
                const fileName = `${selectedSize}_${selectedRange}.html`;
                const frame = document.getElementById('game-frame');
                frame.src = fileName;
                frame.style.display = "block";
                
                // 로드 시점에 프레임으로 부드럽게 스크롤
                frame.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>

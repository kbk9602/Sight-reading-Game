<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>악보 읽기 게임 - 높은음자리표(화음)</title>

<style>
    body { text-align: center; font-family: sans-serif; background-color: #f8f9fa; padding-top: 20px; }

    #staff {
        position: relative;
        width: 520px;
        height: 200px;
        margin: 50px auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: black;
        z-index: 10;
    }

    /* 덧줄 스타일 (가운데 C용) */
    .dynamic-ledger {
        position: absolute;
        width: 46px;
        height: 2px;
        background: black;
        z-index: 10;
    }

    /* 높은음자리표 스타일 */
    #clef {
        position: absolute;
        font-size: 170px;
        left: 10px;
        top: 5px; 
        z-index: 3;
        user-select: none;
    }

    .note {
        position: absolute;
        width: 24px;
        height: 16px;
        border: 4px solid black;
        border-radius: 50%;
        background: transparent; 
        z-index: 5;
        transform: rotate(-15deg);
    }

    /* 피아노 건반 */
    #piano { position: relative; width: 480px; height: 200px; margin: 40px auto; }

    .white {
        position: absolute;
        width: 60px;
        height: 200px;
        background: white;
        border: 1px solid #ccc;
        border-bottom: 4px solid #bbb;
        cursor: pointer;
        border-radius: 0 0 5px 5px;
        display: flex;
        justify-content: center;
        transition: background 0.1s;
    }
    
    /* 선택된 건반 강조 */
    .white.selected { background: #ffeb3b !important; }

    .white span { position: absolute; bottom: 10px; font-size: 14px; font-weight: bold; color: #888; }

    .black { position: absolute; width: 36px; height: 120px; background: #333; top: 0; z-index: 11; pointer-events: none; border-radius: 0 0 3px 3px; }
</style>
</head>

<body>

<h1>🎹 악보 읽기 게임 (가운데 C ~ C5)</h1>
<p>오선지에 나타난 두 개의 음을 건반에서 차례로 눌러보세요!</p>

<div id="staff">
    <div id="clef">𝄞</div>
    <div class="line" style="top:60px"></div>
    <div class="line" style="top:80px"></div>
    <div class="line" style="top:100px"></div>
    <div class="line" style="top:120px"></div>
    <div class="line" style="top:140px"></div>

    <div id="ledger-container"></div>
    <div id="note1" class="note"></div>
    <div id="note2" class="note"></div>
</div>

<div id="piano">
    <div id="key-C" class="white" style="left:0px" onclick="press('C')"><span>가운데 C</span></div>
    <div id="key-D" class="white" style="left:60px" onclick="press('D')"></div>
    <div id="key-E" class="white" style="left:120px" onclick="press('E')"></div>
    <div id="key-F" class="white" style="left:180px" onclick="press('F')"></div>
    <div id="key-G" class="white" style="left:240px" onclick="press('G')"></div>
    <div id="key-A" class="white" style="left:300px" onclick="press('A')"></div>
    <div id="key-B" class="white" style="left:360px" onclick="press('B')"></div>
    <div id="key-C2" class="white" style="left:420px" onclick="press('C2')"></div>

    <div class="black" style="left:42px"></div>
    <div class="black" style="left:102px"></div>
    <div class="black" style="left:222px"></div>
    <div class="black" style="left:282px"></div>
    <div class="black" style="left:342px"></div>
</div>

<h2>현재 점수: <span id="score" style="color: blue;">0</span></h2>

<script>
    const scale = ["C", "D", "E", "F", "G", "A", "B", "C2"];
    let currentSteps = [];
    let userSelection = [];
    let score = 0;

    // 가온 C ~ C5 보정 수치
    const baseY = 158; 
    const stepSize = 10;

    function drawSingleLedger(y, xPos) {
        const container = document.getElementById("ledger-container");
        const div = document.createElement("div");
        div.className = "dynamic-ledger";
        div.style.top = y + "px";
        div.style.left = (xPos - 9) + "px";
        container.appendChild(div);
    }

    function newNotes() {
        userSelection = [];
        document.querySelectorAll('.white').forEach(k => k.classList.remove('selected'));
        document.getElementById("ledger-container").innerHTML = "";

        // 무작위로 2개의 다른 음 선택
        let first = Math.floor(Math.random() * scale.length);
        let second;
        do {
            second = Math.floor(Math.random() * scale.length);
        } while (Math.abs(first - second) < 1);

        currentSteps = [first, second];

        const n1 = document.getElementById("note1");
        const n2 = document.getElementById("note2");
        
        let x1 = 320, x2 = 320;
        // 인접한 음일 경우 좌우 배치
        if (Math.abs(first - second) === 1) {
            if (first < second) { x1 = 308; x2 = 332; }
            else { x1 = 332; x2 = 308; }
        }

        // 음표 위치 설정
        n1.style.top = (baseY - (first * stepSize) - 8) + "px";
        n1.style.left = x1 + "px";
        n2.style.top = (baseY - (second * stepSize) - 8) + "px";
        n2.style.left = x2 + "px";

        // 가운데 C (인덱스 0)일 때 아래 덧줄 표시
        if (first === 0) drawSingleLedger(160, x1);
        if (second === 0) drawSingleLedger(160, x2);
    }

    function press(key) {
        const keyEl = document.getElementById("key-" + key);
        
        if (userSelection.includes(key)) {
            userSelection = userSelection.filter(k => k !== key);
            keyEl.classList.remove('selected');
        } else if (userSelection.length < 2) {
            userSelection.push(key);
            keyEl.classList.add('selected');
        }

        if (userSelection.length === 2) {
            const answers = [scale[currentSteps[0]], scale[currentSteps[1]]];
            if (userSelection.every(val => answers.includes(val))) {
                score++;
                document.getElementById("score").innerText = score;
                setTimeout(newNotes, 400);
            } else {
                alert("다시 확인해 보세요! 😊");
                userSelection = [];
                document.querySelectorAll('.white').forEach(k => k.classList.remove('selected'));
            }
        }
    }

    newNotes();
</script>

</body>
</html>

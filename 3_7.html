<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>악보 읽기 게임 - C5-E6 3화음</title>

<style>
    body { text-align: center; font-family: sans-serif; background-color: #f8f9fa; padding-top: 20px; }

    #staff {
        position: relative;
        width: 520px;
        height: 220px; 
        margin: 50px auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .line { position: absolute; width: 100%; height: 2px; background: black; z-index: 10; }

    .dynamic-ledger {
        position: absolute;
        width: 40px;
        height: 2px;
        background: black;
        z-index: 10;
    }

    #clef {
        position: absolute;
        font-size: 170px;
        left: 10px;
        top: 20px; 
        z-index: 3;
        user-select: none;
    }

    .note {
        position: absolute;
        width: 24px;
        height: 16px;
        border: 4px solid black;
        border-radius: 50%;
        background: transparent; 
        z-index: 15;
        transform: rotate(-15deg);
        display: none; /* 초기 숨김 */
    }

    #piano { position: relative; width: 450px; height: 200px; margin: 40px auto; }

    .white {
        position: absolute; width: 45px; height: 200px; background: white;
        border: 1px solid #ccc; border-bottom: 4px solid #bbb; cursor: pointer;
        border-radius: 0 0 5px 5px; display: flex; justify-content: center;
    }
    
    .white.selected { background: #ffeb3b !important; }

    .white span { 
        position: absolute; bottom: 10px; font-size: 11px; font-weight: bold; 
        color: #888; writing-mode: vertical-rl; text-orientation: upright;
    }

    .black { 
        position: absolute; width: 28px; height: 120px; background: #333; top: 0; 
        z-index: 11; border-radius: 0 0 3px 3px; pointer-events: none;
    }
</style>
</head>

<body>

<h1>🎹 3화음 읽기 게임 (C5 ~ E6)</h1>
<p>오선지에 나타난 세 개의 음을 건반에서 모두 눌러보세요!</p>

<div id="staff">
    <div id="clef">𝄞</div>
    <div class="line" style="top:80px"></div>
    <div class="line" style="top:100px"></div>
    <div class="line" style="top:120px"></div>
    <div class="line" style="top:140px"></div>
    <div class="line" style="top:160px"></div>

    <div id="ledger-container"></div>
    <div id="note1" class="note"></div>
    <div id="note2" class="note"></div>
    <div id="note3" class="note"></div>
</div>

<div id="piano">
    <div id="key-높은 C" class="white" style="left:0px" onclick="press('높은 C')"><span>높은 C</span></div>
    <div id="key-D5" class="white" style="left:45px" onclick="press('D5')"></div>
    <div id="key-E5" class="white" style="left:90px" onclick="press('E5')"></div>
    <div id="key-F5" class="white" style="left:135px" onclick="press('F5')"></div>
    <div id="key-G5" class="white" style="left:180px" onclick="press('G5')"></div>
    <div id="key-A5" class="white" style="left:225px" onclick="press('A5')"></div>
    <div id="key-B5" class="white" style="left:270px" onclick="press('B5')"></div>
    <div id="key-C6" class="white" style="left:315px" onclick="press('C6')"></div>
    <div id="key-D6" class="white" style="left:360px" onclick="press('D6')"></div>
    <div id="key-E6" class="white" style="left:405px" onclick="press('E6')"></div>

    <div class="black" style="left:31px"></div>
    <div class="black" style="left:76px"></div>
    <div class="black" style="left:166px"></div>
    <div class="black" style="left:211px"></div>
    <div class="black" style="left:256px"></div>
    <div class="black" style="left:346px"></div>
    <div class="black" style="left:391px"></div>
</div>

<h2>현재 점수: <span id="score" style="color: blue;">0</span></h2>

<script>
    const scale = ["높은 C", "D5", "E5", "F5", "G5", "A5", "B5", "C6", "D6", "E6"];
    let currentSteps = [];
    let userSelection = [];
    let score = 0;

    const baseY = 98;
    const stepSize = 10;

    function drawLedgers(step, xPos) {
        // 높은음역대 덧줄 로직 (위로 쌓이는 형태)
        if (step >= 5) drawSingleLedger(60, xPos); // 라(A5) 이상
        if (step >= 7) drawSingleLedger(40, xPos); // 도(C6) 이상
        if (step >= 9) drawSingleLedger(20, xPos); // 미(E6) 이상
    }

    function drawSingleLedger(y, xPos) {
        const container = document.getElementById("ledger-container");
        const div = document.createElement("div");
        div.className = "dynamic-ledger";
        div.style.top = y + "px";
        div.style.left = (xPos - 4) + "px";
        container.appendChild(div);
    }

    function newNotes() {
        userSelection = [];
        document.querySelectorAll('.white').forEach(k => k.classList.remove('selected'));
        document.getElementById("ledger-container").innerHTML = "";

        // 1. 중복 없는 3개 인덱스 선택 및 정렬
        let indices = [];
        while(indices.length < 3) {
            let r = Math.floor(Math.random() * scale.length);
            if(!indices.includes(r)) indices.push(r);
        }
        indices.sort((a, b) => a - b);
        currentSteps = indices;

        const noteEls = [document.getElementById("note1"), document.getElementById("note2"), document.getElementById("note3")];
        
        let centerX = 220; 
        let shift = 24; 

        // 2. 가로 위치 계산 (2도 차이 시 지그재그)
        let xPos = [0, 0, 0];
        xPos[0] = centerX - (shift / 2);

        if (indices[1] - indices[0] === 1) xPos[1] = centerX + (shift / 2);
        else xPos[1] = centerX - (shift / 2);

        if (indices[2] - indices[1] === 1) {
            xPos[2] = (xPos[1] > centerX) ? centerX - (shift / 2) : centerX + (shift / 2);
        } else {
            xPos[2] = centerX - (shift / 2);
        }

        // 3. 그리기 및 덧줄 적용
        indices.forEach((step, i) => {
            noteEls[i].style.display = "block";
            noteEls[i].style.top = (baseY - (step * stepSize)) + "px";
            noteEls[i].style.left = xPos[i] + "px";
            drawLedgers(step, xPos[i]);
        });
    }

    function press(key) {
        const keyEl = document.getElementById("key-" + key);
        if (userSelection.includes(key)) {
            userSelection = userSelection.filter(k => k !== key);
            keyEl.classList.remove('selected');
        } else if (userSelection.length < 3) {
            userSelection.push(key);
            keyEl.classList.add('selected');
        }

        if (userSelection.length === 3) {
            const answers = currentSteps.map(idx => scale[idx]);
            if (userSelection.every(val => answers.includes(val))) {
                score++;
                document.getElementById("score").innerText = score;
                setTimeout(newNotes, 400);
            } else {
                alert("다시 확인해 보세요! 😊");
                userSelection = [];
                document.querySelectorAll('.white').forEach(k => k.classList.remove('selected'));
            }
        }
    }

    newNotes();
</script>
</body>
</html>

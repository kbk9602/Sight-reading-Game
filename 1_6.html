<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>악보 읽기 게임 - 높은음자리표(기초)</title>

<style>
    body { text-align: center; font-family: sans-serif; background-color: #f8f9fa; padding-top: 20px; }

    /* 오선지 영역 */
    #staff {
        position: relative;
        width: 520px;
        height: 200px;
        margin: 50px auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* 오선 줄: z-index를 높여 음표 위로 오게 함 */
    .line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: black;
        z-index: 10;
    }

    /* 덧줄 (가운데 C용): 요청하신 312px 위치 반영 */
    .ledger {
        position: absolute;
        width: 46px;
        height: 2px;
        background: black;
        left: 312px;
        display: none;
        z-index: 10; 
    }

    /* 높은음자리표 크기 키움 및 위치 조정 */
    #clef {
        position: absolute;
        font-size: 170px;
        left: 10px;
        top: 5px; 
        z-index: 3;
        user-select: none;
    }

    /* 음표 (관통 효과를 위해 배경 투명) */
    #note {
        position: absolute;
        width: 24px;
        height: 16px;
        border: 4px solid black;
        border-radius: 50%;
        background: transparent; 
        left: 320px;
        z-index: 5;
        transform: rotate(-15deg);
    }

    /* 피아노 건반 */
    #piano { position: relative; width: 480px; height: 200px; margin: 40px auto; }

    .white {
        position: absolute;
        width: 60px;
        height: 200px;
        background: white;
        border: 1px solid #ccc;
        border-bottom: 4px solid #bbb;
        cursor: pointer;
        border-radius: 0 0 5px 5px;
        display: flex;
        justify-content: center;
        transition: background 0.1s;
    }
    .white:active { background: #eee; }
    .white span { position: absolute; bottom: 10px; font-size: 14px; font-weight: bold; color: #888; }

    .black { position: absolute; width: 36px; height: 120px; background: #333; top: 0; z-index: 11; cursor: pointer; border-radius: 0 0 3px 3px; }
</style>
</head>

<body>

<h1>🎹 악보 읽기 게임 (가운데 C ~ C5)</h1>

<div id="staff">
    <div id="clef">𝄞</div>
    
    <div class="line" style="top:60px"></div>
    <div class="line" style="top:80px"></div>
    <div class="line" style="top:100px"></div>
    <div class="line" style="top:120px"></div>
    <div class="line" style="top:140px"></div>

    <div id="ledger" class="ledger"></div>

    <div id="note"></div>
</div>

<div id="piano">
    <div class="white" style="left:0px" onclick="press('C')"><span>가운데 C</span></div>
    <div class="white" style="left:60px" onclick="press('D')"></div>
    <div class="white" style="left:120px" onclick="press('E')"></div>
    <div class="white" style="left:180px" onclick="press('F')"></div>
    <div class="white" style="left:240px" onclick="press('G')"></div>
    <div class="white" style="left:300px" onclick="press('A')"></div>
    <div class="white" style="left:360px" onclick="press('B')"></div>
    <div class="white" style="left:420px" onclick="press('C2')"><span>C5</span></div>

    <div class="black" style="left:42px"></div>
    <div class="black" style="left:102px"></div>
    <div class="black" style="left:222px"></div>
    <div class="black" style="left:282px"></div>
    <div class="black" style="left:342px"></div>
</div>

<h2>현재 점수: <span id="score" style="color: blue;">0</span></h2>

<script>
    // 음계 배열
    const scale = ["C", "D", "E", "F", "G", "A", "B", "C2"];
    
    let currentStep = 0;
    let score = 0;

    // 높은음자리표 가온 C ~ C5 보정 수치
    // C4(가온 도)가 오선지 아래 첫 덧줄에 오도록 설정
    const baseY = 150; // 가온 C 위치
    const stepSize = 10;

    function newNote() {
        currentStep = Math.floor(Math.random() * scale.length);
        
        let y = baseY - (currentStep * stepSize);
        document.getElementById("note").style.top = y + "px";

        let ledger = document.getElementById("ledger");
        ledger.style.display = "none";

        // 가운데 C (인덱스 0)일 때 아래쪽 첫 번째 덧줄 표시
        if (currentStep === 0) {
            ledger.style.display = "block";
            ledger.style.top = "160px"; // 가온 C 음표 중심을 지나는 위치
        }
    }

    function press(key) {
        if (key === scale[currentStep]) {
            score++;
            document.getElementById("score").innerText = score;
            newNote();
        } else {
            alert("다시 확인해 보세요! 😊");
        }
    }

    newNote();
</script>

</body>
</html>

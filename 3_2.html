<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>화음 읽기 게임 - 낮은음역대 3화음</title>
<style>
    body { text-align: center; font-family: sans-serif; background-color: #f8f9fa; padding-top: 20px; }
    
    #staff {
        position: relative;
        width: 520px;
        height: 280px; 
        margin: 40px auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .line { position: absolute; width: 100%; height: 2px; background: black; z-index: 5; }
    
    .dynamic-ledger {
        position: absolute;
        width: 38px;
        height: 2px;
        background: black;
        z-index: 5;
    }

    /* 낮은음자리표 위치 */
    #clef { position: absolute; font-size: 110px; left: 20px; top: 74px; z-index: 3; user-select: none; }

    .note {
        position: absolute;
        width: 22px;
        height: 14px;
        border: 4px solid black;
        border-radius: 50%;
        background: transparent; 
        z-index: 10;
        transform: rotate(-15deg);
    }

    #piano { position: relative; width: 450px; height: 200px; margin: 40px auto; }
    
    .white {
        position: absolute; width: 45px; height: 200px; background: white;
        border: 1px solid #ccc; border-bottom: 4px solid #bbb; cursor: pointer; border-radius: 0 0 5px 5px;
        display: flex; justify-content: center; align-items: flex-end; padding-bottom: 10px;
    }
    
    .white span { 
        font-size: 11px; 
        font-weight: bold; 
        color: #e53935;
        margin-bottom: 5px;
    }
    
    .white.selected { background: #ffeb3b !important; }
    .black { position: absolute; width: 28px; height: 120px; background: #333; top: 0; z-index: 11; border-radius: 0 0 3px 3px; pointer-events: none; }
</style>
</head>
<body>

<h1>🎹 화음 읽기 게임 (C2 ~ E3)</h1>
<p>오선지에 나타난 세 개의 음을 건반에서 모두 눌러보세요!</p>

<div id="staff">
    <div id="clef">𝄢</div>
    <div class="line" style="top:100px"></div>
    <div class="line" style="top:120px"></div>
    <div class="line" style="top:140px"></div>
    <div class="line" style="top:160px"></div>
    <div class="line" style="top:180px"></div>
    
    <div id="ledger-container"></div>
    <div id="note1" class="note"></div>
    <div id="note2" class="note"></div>
    <div id="note3" class="note"></div>
</div>

<div id="piano">
    <div id="key-C2" class="white" style="left:0px" onclick="press('C2')"></div>
    <div id="key-D2" class="white" style="left:45px" onclick="press('D2')"></div>
    <div id="key-E2" class="white" style="left:90px" onclick="press('E2')"></div>
    <div id="key-F2" class="white" style="left:135px" onclick="press('F2')"></div>
    <div id="key-G2" class="white" style="left:180px" onclick="press('G2')"></div>
    <div id="key-A2" class="white" style="left:225px" onclick="press('A2')"></div>
    <div id="key-B2" class="white" style="left:270px" onclick="press('B2')"></div>
    <div id="key-낮은 C" class="white" style="left:315px" onclick="press('낮은 C')"><span>낮은 C</span></div>
    <div id="key-D3" class="white" style="left:360px" onclick="press('D3')"></div>
    <div id="key-E3" class="white" style="left:405px" onclick="press('E3')"></div>

    <div class="black" style="left:31px"></div>
    <div class="black" style="left:76px"></div>
    <div class="black" style="left:166px"></div>
    <div class="black" style="left:211px"></div>
    <div class="black" style="left:256px"></div>
    <div class="black" style="left:346px"></div>
    <div class="black" style="left:391px"></div>
</div>

<h2>현재 점수: <span id="score" style="color: blue;">0</span></h2>

<script>
    const scale = ["C2", "D2", "E2", "F2", "G2", "A2", "B2", "낮은 C", "D3", "E3"];
    let currentSteps = [];
    let userSelection = [];
    let score = 0;

    const stepSize = 10; 
    const baseY = 216; 

    function drawLedgers(step, xPos) {
        if (step === 0) { // C2
            drawSingleLedger(200, xPos);
            drawSingleLedger(220, xPos);
        } else if (step === 1 || step === 2) { // D2, E2
            drawSingleLedger(200, xPos);
        }
    }

    function drawSingleLedger(y, xPos) {
        const container = document.getElementById("ledger-container");
        const div = document.createElement("div");
        div.className = "dynamic-ledger";
        div.style.top = y + "px";
        div.style.left = (xPos - 5) + "px";
        container.appendChild(div);
    }

    function newNotes() {
        userSelection = [];
        document.querySelectorAll('.white').forEach(k => k.classList.remove('selected'));
        document.getElementById("ledger-container").innerHTML = "";

        // 1. 중복 없는 3개 음 선택 및 정렬
        let indices = [];
        while(indices.length < 3) {
            let r = Math.floor(Math.random() * scale.length);
            if(!indices.includes(r)) indices.push(r);
        }
        indices.sort((a, b) => a - b);
        currentSteps = indices;

        const noteEls = [document.getElementById("note1"), document.getElementById("note2"), document.getElementById("note3")];
        
        let centerX = 320; 
        let shift = 24; 

        // 2. 가로 위치 계산 (2도 관계 시 지그재그 배치)
        let xPositions = [];
        xPositions[0] = centerX - (shift / 2); // 최저음 왼쪽

        if (indices[1] - indices[0] === 1) {
            xPositions[1] = centerX + (shift / 2); // 중간음 오른쪽
        } else {
            xPositions[1] = centerX - (shift / 2);
        }

        if (indices[2] - indices[1] === 1) {
            xPositions[2] = (xPositions[1] > centerX) ? centerX - (shift / 2) : centerX + (shift / 2);
        } else {
            xPositions[2] = centerX - (shift / 2);
        }

        // 3. 실제 적용
        indices.forEach((step, i) => {
            noteEls[i].style.top = (baseY - (step * stepSize) - 7) + "px";
            noteEls[i].style.left = xPositions[i] + "px";
            drawLedgers(step, xPositions[i]);
        });
    }

    function press(key) {
        const keyEl = document.getElementById("key-" + key);
        if (userSelection.includes(key)) {
            userSelection = userSelection.filter(k => k !== key);
            keyEl.classList.remove('selected');
        } else if (userSelection.length < 3) {
            userSelection.push(key);
            keyEl.classList.add('selected');
        }

        if (userSelection.length === 3) {
            const answers = currentSteps.map(idx => scale[idx]);
            if (userSelection.every(val => answers.includes(val))) {
                score++;
                document.getElementById("score").innerText = score;
                setTimeout(newNotes, 400);
            } else {
                alert("다시 확인해 보세요! 😊");
                userSelection = [];
                document.querySelectorAll('.white').forEach(k => k.classList.remove('selected'));
            }
        }
    }

    newNotes();
</script>
</body>
</html>
